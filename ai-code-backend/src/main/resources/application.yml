spring:
  application:
    name: ai-code-backend
  profiles:
    active: local
  session:
    store-type: redis
    # session ttl 30 days
    timeout: 2592000
server:
  port: 8123
  servlet:
    context-path: /api
    # frontend cookie ttl 30 days
    session:
      cookie:
        max-age: 2592000

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: dev.jingtao.aicodebackend.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn





# ============================================================
# 配置示例文件 / Example configuration
#
# 复制本文件为 application-local.yml 或 application-prod.yml，
# 并填入你自己的真实配置。请勿将含有真实密钥的文件提交到仓库。
#
# Copy this file to application-local.yml or application-prod.yml
# and fill in your own values. Never commit files containing real secrets.
# ============================================================
spring:
  # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_code_generator
    username: your_db_username
    password: your_db_password
  # redis
  data:
    redis:
      host: localhost
      port: 6379
      ttl: 3600
      password: your_redis_password   # 无密码时留空
# AI
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-v4-flash
      log-requests: false
      log-responses: false
      max-tokens: 65536
      # 输出上限调大后单次生成更耗时，超时同步放宽，避免生成未完成就断流导致内容截断
      timeout: 240s
    streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-v4-flash
      log-requests: false
      log-responses: false
      max-tokens: 65536
      timeout: 240s
    reasoning-streaming-chat-model:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-v4-flash
      max-tokens: 32768
      reasoning-return-thinking: true
      reasoning-send-thinking: true
      reasoning-thinking-field: reasoning_content
      # DeepSeek V4 专用，可设置为 enabled，并配合 reasoning-effort: high/max。其它 OpenAI 兼容供应商请留空
      reasoning-thinking-type: enabled
      reasoning-effort: high
      log-requests: false
      log-responses: false

cloudflare:
  r2:
    endpoint: https://<your-account-id>.r2.cloudflarestorage.com
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    bucket-name: your-bucket-name
    public-url: https://your-public-cdn-domain

pexels:
  api-key: ${PEXELS_API_KEY}
  max-results: 12

logoDev:
  api-key: ${LOGO_DEV_API_KEY}

# 生产环境关闭MyBatis Flex日志
mybatis-flex:
  configuration:
    log-impl: ''

# 接口文档配置访问权限
knife4j:
  basic:
    enable: true
    username: your_doc_username
    password: your_doc_password

# 部署路径，对应的是生产环境的nginx应用地址 + dist
code:
  deploy-host: https://your-deploy-domain/dist
